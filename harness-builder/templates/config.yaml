version: 1

harness:
  mode: mixed          # mixed | read-only | write-only
  output: patch-only   # patch-only | full
  scope_lock: soft     # soft (warn on violation) | hard (block)

mcp:
  graph_mcp_url: "http://127.0.0.1:8788/mcp"   # code-tiny graph endpoint
  mind_mcp_url:  "http://127.0.0.1:8789/mcp"   # doc-tiny vector endpoint
  graph_mcp_tool: "query_subgraph"
  mind_mcp_tool:  "hybrid_search"
  graph_mcp_tool_args_json: ""
  mind_mcp_tool_args_json: ""
  mind_fallback_enabled: true
  mind_fallback_queries: ""
  mind_fallback_top_k: 8
  mind_fallback_max_attempts: 0
  budget_max_tool_calls: 50

budget:
  max_rounds: 2              # how many agent work loops per session
  max_tool_calls: 50
  max_tokens: 120000
  max_duration_seconds: 1800

verify:
  critical:
    test_cmd: ""   # e.g. "pytest -q"  — must pass for task to be marked done
    lint_cmd: ""   # e.g. "ruff check src/"
    type_cmd: ""   # e.g. "mypy src/"
  supplemental:
    - ""           # additional non-blocking checks (semicolon-separated)

policy:
  allowed_tools:
    bugfix:
      - read_code
      - write_code
      - run_tests
    feature:
      - read_code
      - write_code
      - run_tests
    refactor:
      - read_code
      - write_code
      - run_tests
