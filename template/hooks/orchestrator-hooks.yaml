### Estimate Validation Hook
# Validate estimates before staffing planning
name: estimate-validation
type: phase
version: 1.0.0
description: "Validate estimate quality and consistency"
category: validation

timeout: 10s
on_failure: abort

implementation:
  type: skill
  ref: "estimate-validator"

validation:
  consistency_checks:
    - name: range_validity
      check: "best <= base <= worst"
      required: true
    - name: reasonable_variance
      check: "variance within acceptable limits"
      max_variance: 0.5  # 50% variance max
    - name: wbs_completeness
      check: "WBS covers all requirements"
      threshold: 0.9  # 90% coverage

# Examples
examples:
  bidding:
    description: "Estimate validation for bidding"
    hooks:
      phase:
        estimation:
          post: [estimate-validation]

---

### Staffing Ratio Check Hook
# Validate staffing plan ratios
name: staffing-ratio-check
type: phase
version: 1.0.0
description: "Validate staffing plan ratios and distribution"
category: validation

timeout: 5s
on_failure: warn  # Warn only, don't abort

implementation:
  type: skill
  ref: "staffing-validator"

validation:
  ratio_checks:
    - name: phase_distribution
      check: "staffing distributed appropriately across phases"
      default_ratios:
        discovery: 0.10  # 10%
        foundation: 0.20  # 20%
        build: 0.50  # 50%
        stabilize: 0.15  # 15%
        go_live: 0.05  # 5%
      tolerance: 0.10  # 10% tolerance

    - name: role_balance
      check: "appropriate mix of roles"
      min_senior_ratio: 0.3  # At least 30% senior
      max_junior_ratio: 0.4  # At most 40% junior

# Examples
examples:
  bidding:
    description: "Staffing ratio check for bidding"
    hooks:
      phase:
        staffing:
          post: [staffing-ratio-check]

---

### Bid Package Cleanup Hook
# Cleanup and organize bid package artifacts
name: bid-package-cleanup
type: post
version: 1.0.0
description: "Cleanup and organize bid package artifacts"
category: cleanup

timeout: 30s
on_failure: warn

implementation:
  type: skill
  ref: "bid-package-cleaner"

cleanup:
  # Keep final bid package
  keep:
    - "final-bid-package.zip"
    - "proposal/proposal.md"
    - "estimate/estimate_summary.json"
    - "staffing/staffing_plan.md"
    - "quality/quality_gates.md"

  # Remove intermediate artifacts
  remove:
    - "temp/"
    - ".cache/"
    - "*.tmp"
    - "*_draft.*"

  # Archive source data
  archive:
    - "evidence/raw/"
    - "intermediate/"

  safety:
    dry_run: true  # Dry-run by default
    log_all_actions: true

# Examples
examples:
  bidding:
    description: "Bid package cleanup"
    hooks:
      post:
        - bid-package-cleanup

  production:
    description: "Bid package cleanup (production mode)"
    hooks:
      post:
        - name: bid-package-cleanup
          dry_run: false
