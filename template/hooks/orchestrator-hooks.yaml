### Solution Completeness Check Hook
# Verify solution design completeness before estimation
name: solution-completeness-check
type: phase
version: 1.0.0
description: "Verify solution design completeness"
category: validation

timeout: 10s
on_failure: abort

implementation:
  type: skill
  ref: "solution-validator"

validation:
  required_sections:
    - architecture_overview
    - technical_approach
    - risk_assessment
    - success_criteria

  completeness_checks:
    - name: architecture_defined
      check: "architecture is clearly defined"
      required: true
    - name: approach_specified
      check: "technical approach is specified"
      required: true
    - name: risks_identified
      check: "risks are identified and mitigated"
      required: true
    - name: success_criteria_defined
      check: "success criteria are defined"
      required: true

# Examples
examples:
  bidding:
    description: "Solution completeness check for bidding"
    hooks:
      phase:
        solution_design:
          post: [solution-completeness-check]

