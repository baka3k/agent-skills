### Slice Validation Hook
# Validate slice boundaries and scope
name: slice-validation
type: phase
version: 1.0.0
description: "Validate slice boundaries and scope for incremental porting"
category: validation

timeout: 15s
on_failure: abort  # Abort if slice validation fails

implementation:
  type: skill
  ref: "slice-validator"

validation:
  scope_validation:
    - name: slice_within_module
      check: "slice is within module boundaries"
      required: true
      on_failure:
        action: abort
        message: "Slice exceeds module boundaries"

    - name: slice_dependencies_known
      check: "slice dependencies are identified"
      required: true
      on_failure:
        action: abort
        message: "Slice has unknown dependencies"

    - name: slice_size_reasonable
      check: "slice size is reasonable for porting"
      max_functions: 100  # Max 100 functions per slice
      max_lines: 5000  # Max 5000 lines per slice
      on_too_large:
        action: warn
        message: "Slice size exceeds recommendation ({size} functions, {lines} lines)"

  incremental_validity:
    - name: no_overlap_with_previous
      check: "slice does not overlap with already ported code"
      required: true
      on_overlap:
        action: abort
        message: "Slice overlaps with already ported code"

    - name: respects_slice_order
      check: "slice respects porting order from worklist"
      required: true
      on_violation:
        action: abort
        message: "Slice violates porting order"

# Examples
examples:
  porting:
    description: "Slice validation before porting"
    hooks:
      phase:
        porting_phase:
          pre: [slice-validation]

  custom_limits:
    description: "Slice validation with custom size limits"
    hooks:
      phase:
        porting_phase:
          pre:
            - name: slice-validation
              max_functions: 50
              max_lines: 2500
