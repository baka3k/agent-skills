### Migration Artifact Cleanup Hook
# Cleanup migration artifacts and temporary files
name: migration-artifact-cleanup
type: post
version: 1.0.0
description: "Cleanup migration artifacts and temporary files"
category: cleanup

timeout: 60s
on_failure: warn  # Warn only, don't abort

implementation:
  type: skill
  ref: "migration-artifact-cleaner"

cleanup:
  # Keep important migration artifacts
  keep:
    - "migration-planning-data/*.json"
    - "migration-planning-data/*.md"
    - "migration-planning-data/worklist.json"
    - "porting-data/*.parquet"
    - "parity-reports/*.md"
    - "test-harnesses/*.py"

  # Remove temporary files
  remove:
    - "*.tmp"
    - "*_draft.*"
    - ".cache/"
    - "temp/"

  # Archive intermediate artifacts
  archive:
    - "intermediate-artifacts/"
    - "dependency-snapshots/"

  safety:
    dry_run: true  # Dry-run by default
    log_all_actions: true
    require_confirmation: false  # No interactive confirmation

# Examples
examples:
  migration:
    description: "Migration artifact cleanup"
    hooks:
      post:
        - migration-artifact-cleanup

  production:
    description: "Migration artifact cleanup (production mode)"
    hooks:
      post:
        - name: migration-artifact-cleanup
          dry_run: false

